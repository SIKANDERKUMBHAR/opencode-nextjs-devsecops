name: secagent-simple-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  security-scans:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Install secagent and scanners
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/SIKANDERKUMBHAR/secagent-devsecops-orchestrator/main/scripts/setup-local.sh)
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify secagent
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          secagent version
          secagent doctor --config ./secagent-simple.yml || true

      - name: Pre-build scan (local code)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          rm -rf reports reports-prebuild
          npm run start -- -H 0.0.0.0 -p 3000 > /tmp/prebuild-app.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then break; fi
            sleep 2
          done
          docker rm -f secagent-zap || true
          docker run -d --name secagent-zap -p 8090:8090 ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -daemon -host 0.0.0.0 -port 8090 \
            -config api.disablekey=true \
            -config api.addrs.addr.name=.* \
            -config api.addrs.addr.regex=true
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:8090/JSON/core/view/version/ >/dev/null; then break; fi
            sleep 2
          done
          set +e
          secagent scan --target . --config ./secagent-simple.yml
          rc=$?
          set -e
          docker rm -f secagent-zap || true
          pkill -f "next start" || true
          mv reports reports-prebuild
          exit $rc

      - name: Build application image
        run: docker build -t app-under-test:ci .

      - name: Cleanup test ports and containers
        run: |
          docker rm -f app-under-test secagent-zap || true
          docker ps -aq --filter publish=3000 | xargs -r docker rm -f
          docker ps -aq --filter publish=8090 | xargs -r docker rm -f
          pkill -f "next start" || true

      - name: Post-build scan (dockerized secagent)
        run: |
          rm -rf reports reports-postbuild
          docker run -d --name app-under-test -p 3001:3000 app-under-test:ci
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3001 >/dev/null; then break; fi
            sleep 2
          done
          docker rm -f secagent-zap || true
          docker run -d --name secagent-zap -p 8090:8090 ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -daemon -host 0.0.0.0 -port 8090 \
            -config api.disablekey=true \
            -config api.addrs.addr.name=.* \
            -config api.addrs.addr.regex=true
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:8090/JSON/core/view/version/ >/dev/null; then break; fi
            sleep 2
          done
          cp secagent-simple.yml secagent-simple-postbuild.yml
          sed -i 's|target_url: http://127.0.0.1:3000|target_url: http://127.0.0.1:3001|' secagent-simple-postbuild.yml
          docker pull sikanderali/secagent:latest
          set +e
          docker run --rm --network host --user "$(id -u):$(id -g)" -v "$PWD":/workspace -w /workspace \
            sikanderali/secagent:latest scan --target /workspace --config /workspace/secagent-simple-postbuild.yml
          rc=$?
          set -e
          docker rm -f secagent-zap || true
          docker rm -f app-under-test || true
          rm -f secagent-simple-postbuild.yml
          mv reports reports-postbuild
          exit $rc

      - name: Upload pre-build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secagent-prebuild-reports
          path: reports-prebuild/

      - name: Upload post-build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secagent-postbuild-reports
          path: reports-postbuild/

      - name: Upload SARIF (post-build)
        if: always() && github.event_name == 'push' && hashFiles('reports-postbuild/secagent-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports-postbuild/secagent-report.sarif
